<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#e5e2e1",
              "on-primary-fixed": "#001a41",
              "surface-bright": "#393939",
              "tertiary-fixed": "#ffdbcc",
              "on-secondary-container": "#d6a9ff",
              "secondary": "#ddb7ff",
              "surface-tint": "#adc6ff",
              "on-primary-container": "#00285c",
              "primary-container": "#4b8eff",
              "on-tertiary-fixed": "#351000",
              "outline-variant": "#414755",
              "error": "#ffb4ab",
              "on-tertiary-container": "#4c1a00",
              "tertiary": "#ffb595",
              "error-container": "#93000a",
              "surface-container-low": "#1c1b1b",
              "on-surface": "#e5e2e1",
              "surface-container-high": "#2a2a2a",
              "secondary-fixed": "#f0dbff",
              "surface-variant": "#353534",
              "on-error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#7c2e00",
              "on-primary": "#002e69",
              "surface-container-highest": "#353534",
              "surface-container-lowest": "#0e0e0e",
              "surface": "#131313",
              "on-surface-variant": "#c1c6d7",
              "on-primary-fixed-variant": "#004493",
              "surface-container": "#201f1f",
              "inverse-surface": "#e5e2e1",
              "on-error": "#690005",
              "on-secondary": "#490080",
              "inverse-primary": "#005bc1",
              "tertiary-container": "#ef6719",
              "primary": "#adc6ff",
              "tertiary-fixed-dim": "#ffb595",
              "primary-fixed": "#d8e2ff",
              "inverse-on-surface": "#313030",
              "surface-dim": "#131313",
              "secondary-fixed-dim": "#ddb7ff",
              "outline": "#8b90a0",
              "on-tertiary": "#571e00",
              "on-secondary-fixed-variant": "#6900b3",
              "background": "#131313",
              "on-secondary-fixed": "#2c0051",
              "secondary-container": "#6f00be",
              "primary-fixed-dim": "#adc6ff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        body {
            background-color: #0E0E0E;
            color: #e5e2e1;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-code-pattern {
            background-image: radial-gradient(#414755 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.15;
        }
        .kinetic-gradient {
            background: linear-gradient(135deg, #ADC6FF 0%, #4B8EFF 100%);
        }
    </style>
</head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col relative overflow-hidden">
<div class="absolute inset-0 bg-code-pattern pointer-events-none"></div>
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-surface-container-lowest/50 to-surface-container-lowest pointer-events-none"></div>
<header class="fixed top-0 w-full z-50 bg-[#131313]/80 backdrop-blur-xl border-b border-[#414755]/15 shadow-2xl shadow-black/40 flex items-center justify-between px-6 h-14">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#ADC6FF]" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="text-lg font-bold tracking-tighter text-[#ADC6FF]">Stitch Code</span>
</div>
<div class="flex items-center gap-4">
<a class="text-[#A0A0A0] hover:text-white transition-colors duration-200 font-['Inter'] text-sm" href="#">Docs</a>
<a class="text-white bg-[#4b8eff]/10 px-3 py-1.5 rounded-lg border border-[#4b8eff]/20 text-sm font-semibold" href="#">Sign In</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pt-14 relative z-10">
<div class="w-full max-w-[420px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold tracking-tight text-on-surface mb-2">Build the future.</h1>
<p class="text-on-surface-variant font-body text-sm">Join the ecosystem of kinetic developers.</p>
</div>
<div class="bg-surface-container border border-outline-variant/15 rounded-xl p-8 shadow-2xl shadow-black/60 relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
<form class="space-y-6">
<div class="space-y-1.5">
<label class="block text-[11px] font-mono uppercase tracking-widest text-on-surface-variant/70" for="name">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 focus:ring-1 focus:ring-primary/50 rounded-lg text-sm px-4 py-3 text-on-surface placeholder:text-on-surface-variant/30 transition-all" id="name" name="name" placeholder="Linus Torvalds" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[11px] font-mono uppercase tracking-widest text-on-surface-variant/70" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 focus:ring-1 focus:ring-primary/50 rounded-lg text-sm px-4 py-3 text-on-surface placeholder:text-on-surface-variant/30 transition-all" id="email" name="email" placeholder="dev@stitchcode.io" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-[11px] font-mono uppercase tracking-widest text-on-surface-variant/70" for="password">Secure Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 focus:ring-1 focus:ring-primary/50 rounded-lg text-sm px-4 py-3 text-on-surface placeholder:text-on-surface-variant/30 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full kinetic-gradient text-on-primary-container font-semibold py-3.5 rounded-lg active:scale-95 transition-all shadow-lg shadow-primary/10 hover:shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-outline-variant/10 flex flex-col items-center gap-4">
<div class="flex items-center gap-4 w-full">
<div class="h-px flex-grow bg-outline-variant/10"></div>
<span class="text-[10px] font-mono text-on-surface-variant/40 uppercase tracking-widest">social sign up</span>
<div class="h-px flex-grow bg-outline-variant/10"></div>
</div>
<div class="grid grid-cols-2 gap-3 w-full">
<button class="flex items-center justify-center gap-2 bg-surface-container-high hover:bg-surface-variant border border-outline-variant/20 py-2.5 rounded-lg text-xs font-medium transition-colors">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
                            GitHub
                        </button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high hover:bg-surface-variant border border-outline-variant/20 py-2.5 rounded-lg text-xs font-medium transition-colors">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                            Google
                        </button>
</div>
</div>
</div>
<p class="text-center mt-8 text-on-surface-variant/60 text-sm">
                Already have an account? 
                <a class="text-primary hover:text-primary-container font-semibold transition-colors ml-1 underline underline-offset-4 decoration-primary/30" href="#">Sign In</a>
</p>
</div>
</main>
<footer class="w-full py-8 px-8 border-t border-[#414755]/10 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto relative z-10">
<div class="mb-4 md:mb-0">
<p class="font-['Inter'] text-xs text-[#A0A0A0]">© 2024 Stitch Code. Built for the kinetic developer.</p>
</div>
<div class="flex gap-6">
<a class="font-['Inter'] text-xs text-[#606060] hover:text-[#ADC6FF] hover:underline transition-colors" href="#">Privacy</a>
<a class="font-['Inter'] text-xs text-[#606060] hover:text-[#ADC6FF] hover:underline transition-colors" href="#">Terms</a>
<a class="font-['Inter'] text-xs text-[#606060] hover:text-[#ADC6FF] hover:underline transition-colors" href="#">Github</a>
<a class="font-['Inter'] text-xs text-[#606060] hover:text-[#ADC6FF] hover:underline transition-colors" href="#">Status</a>
</div>
</footer>
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-96 h-96 bg-secondary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
